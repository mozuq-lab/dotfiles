[permissions.dotfiles-workspace]
description = "Workspace access with sensitive files denied."
extends = ":workspace"

[permissions.dotfiles-workspace.filesystem]
glob_scan_max_depth = 16
":root" = "deny"
":minimal" = "read"
":tmpdir" = "deny"
":slash_tmp" = "deny"
"~/.ssh" = "deny"
"~/.gnupg" = "deny"
"~/.aws/credentials" = "deny"
"~/.config/gcloud" = "deny"
"~/.kube" = "deny"
"~/.docker/config.json" = "deny"
"~/.npmrc" = "deny"
"~/.pypirc" = "deny"
"~/.cargo/credentials.toml" = "deny"
"~/.netrc" = "deny"
"~/.claude/.credentials.json" = "deny"
"~/.zsh_history" = "deny"
"~/.bash_history" = "deny"

[permissions.dotfiles-workspace.filesystem.":workspace_roots"]
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/.env.*.local" = "deny"
"**/.env.development" = "deny"
"**/.env.dev" = "deny"
"**/.env.test" = "deny"
"**/.env.staging" = "deny"
"**/.env.production" = "deny"
"**/.env.prod" = "deny"
"**/.env.ci" = "deny"
"**/.envrc" = "deny"
"**/*.tfstate" = "deny"
"**/*.tfstate.*" = "deny"
"**/*.tfvars" = "deny"
"**/*.tfvars.json" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.p12" = "deny"
"**/*.pfx" = "deny"
"**/*.keystore" = "deny"
"**/*.jks" = "deny"
"**/id_rsa" = "deny"
"**/id_ed25519" = "deny"
